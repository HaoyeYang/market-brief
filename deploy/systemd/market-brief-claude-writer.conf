[Service]
# Hybrid production route: NVIDIA/Z.AI research agents -> Claude subscription
# writer. multi_provider_brief.py automatically falls back to Kimi if Claude
# authentication, quota, timeout, or payload validation fails.
Environment=MARKET_BRIEF_WRITER=claude
Environment=MARKET_BRIEF_CLAUDE_MODEL=opus
Environment=MARKET_BRIEF_CLAUDE_EFFORT=high
Environment=CLAUDE_BIN=/home/marketbrief/.local/bin/claude
